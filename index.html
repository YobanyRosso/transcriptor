<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Transcriptor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --accent: #7c5cfc;
    --accent2: #c084fc;
    --live: #22d3a8;
    --live-dim: rgba(34,211,168,0.10);
    --text: #e8e6f0;
    --muted: #6b6880;
    --border: rgba(124,92,252,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  body::before {
    content:''; position:fixed; top:-30%; left:-20%; width:70%; height:70%;
    background:radial-gradient(ellipse, rgba(124,92,252,0.07) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:''; position:fixed; bottom:-20%; right:-20%; width:60%; height:60%;
    background:radial-gradient(ellipse, rgba(192,132,252,0.05) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }

  /* ── Header ── */
  .header {
    position:relative; z-index:10;
    padding:13px 18px 11px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
    background:rgba(10,10,15,0.9);
    backdrop-filter:blur(20px);
    flex-shrink:0;
  }

  .logo {
    font-family:'Syne',sans-serif; font-weight:800; font-size:17px;
    letter-spacing:-0.5px;
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }

  .status-pill {
    display:flex; align-items:center; gap:5px;
    font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--muted); background:var(--surface);
    border:1px solid var(--border); padding:4px 10px; border-radius:100px;
    transition:all 0.3s;
  }
  .status-pill.live {
    color:var(--live); border-color:rgba(34,211,168,0.3); background:var(--live-dim);
  }
  .status-dot {
    width:5px; height:5px; border-radius:50%; background:var(--muted); transition:all 0.3s;
  }
  .status-pill.live .status-dot {
    background:var(--live); box-shadow:0 0 6px var(--live);
    animation:pdot 1.2s ease-in-out infinite;
  }
  @keyframes pdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.6)} }

  /* ── Waveform ── */
  .waveform-container {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:center;
    gap:2px; height:52px; padding:0 18px; flex-shrink:0;
  }
  .wave-bar {
    width:2px; border-radius:2px; background:var(--accent);
    opacity:0.22; height:5px; transition:height 0.08s ease; transform-origin:center;
  }
  .wave-bar.active { opacity:0.65; }

  /* ── Transcript ── */
  .transcript-wrapper {
    flex:1; position:relative; z-index:10; overflow:hidden; display:flex; flex-direction:column;
  }

  .transcript-scroll {
    flex:1; overflow-y:auto;
    padding:14px 16px 140px;
    scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
  }
  .transcript-scroll::-webkit-scrollbar { display:none; }

  .empty-state {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; gap:10px; color:var(--muted); text-align:center; padding:40px;
  }
  .empty-icon { font-size:44px; opacity:0.32; filter:grayscale(1); }
  .empty-label { font-size:12px; line-height:1.7; letter-spacing:0.02em; }

  /* ── Text blocks ── */
  .text-block {
    margin-bottom:12px;
    animation:si 0.25s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes si { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

  .block-time {
    font-size:9px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--muted); margin-bottom:5px; padding-left:3px;
  }

  .block-bubble {
    font-size:15px; line-height:1.72; color:var(--text);
    background:var(--surface);
    border:1px solid var(--border);
    border-left:2.5px solid var(--accent);
    border-radius:3px 12px 12px 12px;
    padding:10px 14px;
  }

  /* Live interim text */
  .interim-block {
    margin-bottom:12px;
  }
  .interim-bubble {
    font-size:15px; line-height:1.72;
    color:var(--live);
    background:var(--live-dim);
    border:1px solid rgba(34,211,168,0.2);
    border-left:2.5px solid var(--live);
    border-radius:3px 12px 12px 12px;
    padding:10px 14px;
    min-height:46px;
  }
  .cursor {
    display:inline-block; width:2px; height:0.88em;
    background:var(--live); margin-left:2px; vertical-align:text-bottom;
    animation:blink 0.8s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* word count badge */
  .word-count {
    position:relative; z-index:10;
    text-align:center; font-size:9px; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--muted);
    padding:4px; flex-shrink:0;
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    padding:10px 18px max(env(safe-area-inset-bottom),14px);
    background:linear-gradient(to top,var(--bg) 60%,transparent);
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }

  .btn-row {
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
  }

  .btn-side {
    font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.07em;
    text-transform:uppercase; color:var(--muted); background:var(--surface);
    border:1px solid var(--border); border-radius:100px; padding:9px 14px;
    cursor:pointer; transition:all 0.2s; flex:1; max-width:110px; text-align:center;
  }
  .btn-side:active { transform:scale(0.94); }
  .btn-side:hover { color:var(--text); border-color:rgba(124,92,252,0.4); }
  .btn-side.success { color:var(--live); border-color:rgba(34,211,168,0.4); }

  .btn-record {
    width:66px; height:66px; border-radius:50%; border:none;
    cursor:pointer; position:relative; flex-shrink:0; background:transparent;
    transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .btn-record::before {
    content:''; position:absolute; inset:0; border-radius:50%;
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
    box-shadow:0 4px 18px rgba(124,92,252,0.32); transition:all 0.3s;
  }
  .btn-record.recording::before {
    background:linear-gradient(135deg,#fc5c5c 0%,#fc7c5c 100%);
    animation:rp 1.5s ease-in-out infinite;
  }
  @keyframes rp {
    0%,100%{box-shadow:0 0 0 5px rgba(252,92,92,0.12),0 0 20px rgba(252,92,92,0.25)}
    50%{box-shadow:0 0 0 11px rgba(252,92,92,0.06),0 0 32px rgba(252,92,92,0.35)}
  }
  .btn-record:active { transform:scale(0.93); }
  .btn-record-inner {
    position:absolute; inset:50%; transform:translate(-50%,-50%);
    width:22px; height:22px; border-radius:50%; background:white;
    transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .btn-record.recording .btn-record-inner { border-radius:5px; width:17px; height:17px; }

  .toast {
    position:fixed; bottom:100px; left:50%;
    transform:translateX(-50%) translateY(14px);
    background:#1e1020; border:1px solid rgba(252,92,92,0.3);
    color:#fc9c9c; font-size:11px; padding:8px 16px;
    border-radius:100px; opacity:0; pointer-events:none;
    transition:all 0.3s; white-space:nowrap; z-index:50;
    max-width:88vw; text-align:center;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* No support warning */
  .no-support {
    display:none; position:fixed; inset:0; z-index:100;
    background:var(--bg); flex-direction:column;
    align-items:center; justify-content:center;
    gap:16px; padding:40px; text-align:center;
  }
  .no-support.visible { display:flex; }
  .no-support h2 { font-family:'Syne',sans-serif; font-size:20px; color:var(--accent2); }
  .no-support p { font-size:13px; color:var(--muted); line-height:1.7; max-width:300px; }
</style>
</head>
<body>

<!-- No support fallback -->
<div class="no-support" id="noSupport">
  <div style="font-size:48px">😔</div>
  <h2>Navegador no compatible</h2>
  <p>La transcripción en tiempo real requiere Chrome o Edge. Abrí la app en Chrome para continuar.</p>
</div>

<div class="header">
  <span class="logo">transcriptor</span>
  <div class="status-pill" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">listo</span>
  </div>
</div>

<div class="waveform-container" id="waveform"></div>

<div class="transcript-wrapper">
  <div class="transcript-scroll" id="transcriptScroll">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎙️</div>
      <div class="empty-label">Presioná el botón para<br>transcribir en tiempo real</div>
    </div>
  </div>
</div>

<div class="word-count" id="wordCount"></div>

<div class="bottom-bar">
  <div class="btn-row">
    <button class="btn-side" id="btnClear">borrar</button>
    <button class="btn-side" id="btnCopy">copiar</button>
    <button class="btn-side" id="btnExport">exportar</button>
  </div>
  <button class="btn-record" id="btnRecord">
    <div class="btn-record-inner"></div>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Check support ─────────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  document.getElementById('noSupport').classList.add('visible');
}

// ── State ─────────────────────────────────────────────────────────────
let recognition   = null;
let isRecording   = false;
let blocks        = [];        // finalized text blocks [{time, text}]
let interimText   = '';        // live in-progress text
let analyser      = null;
let animFrame     = null;
let stream        = null;
let wordCount     = 0;
let restartTimer  = null;      // auto-restart on end

// ── DOM ───────────────────────────────────────────────────────────────
const btnRecord  = document.getElementById('btnRecord');
const btnClear   = document.getElementById('btnClear');
const btnCopy    = document.getElementById('btnCopy');
const btnExport  = document.getElementById('btnExport');
const statusPill = document.getElementById('statusPill');
const statusText = document.getElementById('statusText');
const scroll     = document.getElementById('transcriptScroll');
const emptyState = document.getElementById('emptyState');
const toast      = document.getElementById('toast');
const waveform   = document.getElementById('waveform');
const wcEl       = document.getElementById('wordCount');

// ── Waveform ──────────────────────────────────────────────────────────
const BAR_COUNT = 46;
for (let i = 0; i < BAR_COUNT; i++) {
  const b = document.createElement('div');
  b.className = 'wave-bar';
  waveform.appendChild(b);
}
const bars = waveform.querySelectorAll('.wave-bar');

function animateWave(arr) {
  if (!analyser) return;
  animFrame = requestAnimationFrame(() => animateWave(arr));
  analyser.getByteFrequencyData(arr);
  const step = Math.floor(arr.length / BAR_COUNT);
  bars.forEach((b, i) => {
    b.style.height = Math.max(4, (arr[i * step] / 255) * 46) + 'px';
  });
}
function stopWaveAnim() {
  if (animFrame) cancelAnimationFrame(animFrame);
  bars.forEach(b => { b.style.height = '5px'; b.classList.remove('active'); });
}

// ── Helpers ───────────────────────────────────────────────────────────
function setStatus(txt, live = false) {
  statusText.textContent = txt;
  statusPill.className = 'status-pill' + (live ? ' live' : '');
}

let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

function nowTime() {
  return new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function countWords(text) {
  return text.trim().split(/\s+/).filter(Boolean).length;
}

function updateWordCount() {
  const total = blocks.reduce((n, b) => n + countWords(b.text), 0) + countWords(interimText);
  wordCount = total;
  wcEl.textContent = total > 0 ? `${total} palabra${total !== 1 ? 's' : ''}` : '';
}

// ── Render ────────────────────────────────────────────────────────────
function getInterimEl() { return document.getElementById('interimBlock'); }

function renderBlocks() {
  scroll.querySelectorAll('.text-block, .interim-block, .empty-state').forEach(e => e.remove());

  if (!blocks.length && !interimText && !isRecording) {
    scroll.appendChild(emptyState);
    updateWordCount();
    return;
  }

  blocks.forEach(b => scroll.appendChild(buildBlock(b)));

  // Live interim block
  const interim = document.createElement('div');
  interim.className = 'interim-block';
  interim.id = 'interimBlock';
  interim.innerHTML = `<div class="interim-bubble">${interimText || ''}<span class="cursor"></span></div>`;
  if (isRecording) scroll.appendChild(interim);

  scroll.scrollTop = scroll.scrollHeight;
  updateWordCount();
}

function buildBlock({ time, text }) {
  const div = document.createElement('div');
  div.className = 'text-block';
  div.innerHTML = `
    <div class="block-time">${time}</div>
    <div class="block-bubble">${text}</div>`;
  return div;
}

// Efficient: just update interim bubble without full re-render
function updateInterim(text) {
  interimText = text;
  let el = getInterimEl();
  if (!el) {
    // Create if missing
    el = document.createElement('div');
    el.className = 'interim-block';
    el.id = 'interimBlock';
    scroll.appendChild(el);
  }
  el.innerHTML = `<div class="interim-bubble">${text}<span class="cursor"></span></div>`;
  scroll.scrollTop = scroll.scrollHeight;
  updateWordCount();
}

function finalizeInterim(text) {
  if (!text.trim()) return;
  const block = { time: nowTime(), text: text.trim() };
  blocks.push(block);

  // Replace interim element with final block
  const interim = getInterimEl();
  const finalEl = buildBlock(block);
  finalEl.style.animation = 'none'; // already visible, skip animation
  if (interim) interim.replaceWith(finalEl);
  else scroll.appendChild(finalEl);

  interimText = '';
  updateWordCount();
  scroll.scrollTop = scroll.scrollHeight;
}

// ── Speech Recognition ────────────────────────────────────────────────
function buildRecognition() {
  const r = new SpeechRecognition();
  r.continuous     = true;
  r.interimResults = true;
  r.lang           = 'es';      // broad Spanish — works on most Android
  r.maxAlternatives = 1;

  r.onaudiostart = () => {
    setStatus('grabando', true);
    bars.forEach(b => b.classList.add('active'));
  };

  r.onstart = () => {
    setStatus('grabando', true);
  };

  r.onspeechstart = () => {
    setStatus('escuchando...', true);
  };

  r.onresult = (e) => {
    let interim = '';
    let final   = '';

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t + ' ';
      else interim += t;
    }

    if (final.trim()) finalizeInterim(final.trim());
    else if (interim) updateInterim(interim);
  };

  r.onerror = (e) => {
    console.warn('Speech error:', e.error);
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      showToast('Micrófono bloqueado — habilitalo en Chrome');
      stopRecording(); return;
    }
    if (e.error === 'network') {
      showToast('Sin conexión — la Web Speech API requiere internet');
      return;
    }
    if (e.error === 'language-not-supported') {
      showToast('Idioma no soportado — probando con es-ES...');
      recognition.lang = 'es-ES';
      return;
    }
    if (e.error === 'audio-capture') {
      showToast('No se pudo capturar audio — verificá el micrófono');
      stopRecording(); return;
    }
    showToast('Error: ' + e.error);
  };

  r.onend = () => {
    // Auto-restart if still supposed to be recording
    if (isRecording) {
      clearTimeout(restartTimer);
      restartTimer = setTimeout(() => {
        if (isRecording && recognition) {
          try { recognition.start(); } catch {}
        }
      }, 200);
    }
  };

  return r;
}

// ── Mic stream for waveform only ──────────────────────────────────────
async function startWaveform() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(stream);
    analyser  = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const arr = new Uint8Array(analyser.frequencyBinCount);
    bars.forEach(b => b.classList.add('active'));
    animateWave(arr);
  } catch (err) {
    console.warn('Waveform mic error:', err.name);
    // Waveform is optional — recognition still works
  }
}

function stopWaveform() {
  stopWaveAnim();
  analyser = null;
  stream?.getTracks().forEach(t => t.stop());
  stream = null;
}

// ── Recording control ─────────────────────────────────────────────────
async function startRecording() {
  if (!SpeechRecognition) return;

  isRecording  = true;
  recognition  = buildRecognition();
  interimText  = '';

  btnRecord.classList.add('recording');
  setStatus('iniciando...', true);

  // Show interim block immediately
  renderBlocks();

  try {
    recognition.start();
    // Diagnostic: if no result in 4s, warn user
    setTimeout(() => {
      if (isRecording && !blocks.length && !interimText) {
        showToast('Hablá cerca del micrófono — esperando audio...');
      }
    }, 4000);
  } catch (err) {
    showToast('Error al iniciar: ' + err.message);
    stopRecording(); return;
  }

  await startWaveform();
}

function stopRecording() {
  isRecording = false;
  clearTimeout(restartTimer);

  if (recognition) {
    try { recognition.stop(); } catch {}
    recognition = null;
  }

  // Finalize any pending interim
  if (interimText.trim()) finalizeInterim(interimText);
  interimText = '';

  btnRecord.classList.remove('recording');
  setStatus('listo', false);
  stopWaveform();

  // Remove interim bubble
  getInterimEl()?.remove();
  if (!blocks.length) scroll.appendChild(emptyState);
  updateWordCount();
}

// ── Export ────────────────────────────────────────────────────────────
function exportTxt() {
  if (!blocks.length) { showToast('No hay texto para exportar'); return; }
  const txt = blocks.map(b => `[${b.time}] ${b.text}`).join('\n\n');
  const blob = new Blob([txt], { type:'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `transcripcion-${new Date().toISOString().slice(0,16).replace('T','-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Events ────────────────────────────────────────────────────────────
btnRecord.addEventListener('click', () => {
  if (isRecording) stopRecording(); else startRecording();
});

btnClear.addEventListener('click', () => {
  if (isRecording) return;
  blocks = []; interimText = '';
  renderBlocks();
});

btnCopy.addEventListener('click', () => {
  if (!blocks.length) { showToast('No hay texto para copiar'); return; }
  const txt = blocks.map(b => b.text).join('\n\n');
  navigator.clipboard.writeText(txt).then(() => {
    btnCopy.textContent = '✓ listo';
    btnCopy.classList.add('success');
    setTimeout(() => { btnCopy.textContent = 'copiar'; btnCopy.classList.remove('success'); }, 2000);
  }).catch(() => showToast('No se pudo copiar'));
});

btnExport.addEventListener('click', exportTxt);

// ── Init ──────────────────────────────────────────────────────────────
renderBlocks();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Transcriptor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #faf8f4;
    --bg2: #f2ede4;
    --surface: #ffffff;
    --accent: #c8412a;
    --accent-dim: rgba(200,65,42,0.08);
    --accent2: #e8855a;
    --live: #1a7a4a;
    --live-dim: rgba(26,122,74,0.08);
    --live-border: rgba(26,122,74,0.25);
    --text: #1a1814;
    --text2: #5a5550;
    --muted: #9a9490;
    --border: rgba(26,24,20,0.10);
    --border2: rgba(26,24,20,0.06);
    --shadow: 0 2px 12px rgba(26,24,20,0.08);
    --shadow-lg: 0 8px 32px rgba(26,24,20,0.14);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex; flex-direction: column;
    overflow: hidden; position: fixed; width: 100%;
  }

  /* ── Header ── */
  .header {
    position: relative; z-index: 10;
    padding: 16px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span {
    color: var(--accent);
  }

  .header-right {
    display: flex; align-items: center; gap: 10px;
  }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 100px;
    transition: all 0.3s;
  }
  .status-pill.live {
    color: var(--live);
    background: var(--live-dim);
    border-color: var(--live-border);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: all 0.3s;
  }
  .status-pill.live .status-dot {
    background: var(--live);
    box-shadow: 0 0 0 3px var(--live-dim);
    animation: pdot 1.4s ease-in-out infinite;
  }
  @keyframes pdot { 0%,100%{transform:scale(1)} 50%{transform:scale(0.6); opacity:0.5} }

  .btn-history {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 500;
    color: var(--text2);
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-history:active { transform: scale(0.95); background: var(--border); }

  /* ── Waveform ── */
  .waveform-container {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    gap: 2.5px; height: 48px; padding: 0 20px; flex-shrink: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border2);
  }
  .wave-bar {
    width: 2.5px; border-radius: 3px;
    background: var(--accent);
    opacity: 0.15; height: 4px;
    transition: height 0.08s ease; transform-origin: center;
  }
  .wave-bar.active { opacity: 0.55; }

  /* ── Transcript area ── */
  .transcript-wrapper {
    flex: 1; overflow: hidden; display: flex; flex-direction: column;
    position: relative; z-index: 5;
  }

  .transcript-scroll {
    flex: 1; overflow-y: auto;
    padding: 20px 20px 150px;
    -webkit-overflow-scrolling: touch;
  }
  .transcript-scroll::-webkit-scrollbar { display: none; }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%;
    gap: 14px; text-align: center; padding: 40px;
  }
  .empty-icon {
    width: 72px; height: 72px; border-radius: 20px;
    background: var(--bg2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .empty-title {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 400; color: var(--text);
  }
  .empty-sub {
    font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 240px;
  }

  /* ── Text blocks ── */
  .text-block {
    margin-bottom: 16px;
    animation: si 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes si { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .block-meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; padding-left: 2px;
  }
  .block-time {
    font-size: 11px; font-weight: 500;
    color: var(--muted); letter-spacing: 0.03em;
  }
  .block-seg {
    font-size: 10px; color: var(--muted);
    background: var(--bg2); border: 1px solid var(--border);
    padding: 1px 7px; border-radius: 100px;
  }

  .block-bubble {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 300; line-height: 1.65;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 2px 14px 14px 14px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
  }

  /* Live interim */
  .interim-block { margin-bottom: 16px; }
  .interim-bubble {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 300; line-height: 1.65;
    color: var(--live);
    background: var(--live-dim);
    border: 1px solid var(--live-border);
    border-left: 3px solid var(--live);
    border-radius: 2px 14px 14px 14px;
    padding: 14px 18px;
    min-height: 56px;
  }
  .cursor {
    display: inline-block; width: 2px; height: 0.85em;
    background: var(--live); margin-left: 3px; vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Processing indicator */
  .proc-bar {
    position: relative; z-index: 10;
    height: 3px; background: var(--bg2); flex-shrink: 0; overflow: hidden;
  }
  .proc-fill {
    position: absolute; left: -100%; top: 0; bottom: 0; width: 100%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .proc-fill.active {
    opacity: 1;
    animation: sweep 1.2s ease-in-out infinite;
  }
  @keyframes sweep { 0%{left:-100%} 100%{left:100%} }

  /* Word count */
  .footer-info {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    gap: 16px; padding: 6px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border2);
    flex-shrink: 0;
  }
  .info-chip {
    font-size: 11px; color: var(--muted); font-weight: 500;
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 12px 20px max(env(safe-area-inset-bottom), 16px);
    background: linear-gradient(to top, var(--bg) 65%, transparent);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }

  .btn-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; width: 100%;
  }

  .btn-side {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--text2);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 11px 18px;
    cursor: pointer; transition: all 0.2s;
    flex: 1; max-width: 110px; text-align: center;
    box-shadow: var(--shadow);
    min-height: 44px;
  }
  .btn-side:active { transform: scale(0.95); background: var(--bg2); }
  .btn-side.success { color: var(--live); border-color: var(--live-border); }

  .btn-record {
    width: 72px; height: 72px; border-radius: 50%; border: none;
    cursor: pointer; position: relative; flex-shrink: 0; background: transparent;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .btn-record::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 4px 20px rgba(200,65,42,0.4);
    transition: all 0.3s;
  }
  .btn-record.recording::before {
    background: #1a7a4a;
    box-shadow: 0 4px 20px rgba(26,122,74,0.4);
    animation: rp 1.8s ease-in-out infinite;
  }
  @keyframes rp {
    0%,100%{box-shadow:0 4px 20px rgba(26,122,74,0.4)}
    50%{box-shadow:0 4px 32px rgba(26,122,74,0.6), 0 0 0 10px rgba(26,122,74,0.08)}
  }
  .btn-record:active { transform: scale(0.92); }
  .btn-record-inner {
    position: absolute; inset: 50%; transform: translate(-50%,-50%);
    width: 26px; height: 26px; border-radius: 50%; background: white;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .btn-record.recording .btn-record-inner {
    border-radius: 6px; width: 20px; height: 20px;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 110px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--text); color: var(--bg);
    font-size: 13px; font-weight: 500;
    padding: 10px 18px; border-radius: 100px;
    opacity: 0; pointer-events: none; transition: all 0.3s;
    white-space: nowrap; z-index: 50; max-width: 88vw; text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--accent); }

  /* ── History panel ── */
  .history-panel {
    position: fixed; inset: 0; z-index: 30;
    background: var(--bg);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    display: flex; flex-direction: column;
  }
  .history-panel.open { transform: translateX(0); }

  .history-header {
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .history-title {
    font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600;
  }
  .btn-close {
    font-size: 13px; font-weight: 500; color: var(--accent);
    background: none; border: none; cursor: pointer; padding: 6px;
  }

  .history-list {
    flex: 1; overflow-y: auto; padding: 16px;
  }
  .history-list::-webkit-scrollbar { display: none; }

  .history-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 200px; gap: 10px;
    color: var(--muted); font-size: 14px; text-align: center;
  }

  .history-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 12px;
    cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
  }
  .history-item:active { transform: scale(0.98); background: var(--bg2); }
  .history-item-date {
    font-size: 12px; font-weight: 600; color: var(--accent);
    margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .history-item-preview {
    font-family: 'Fraunces', serif; font-size: 15px; font-weight: 300;
    color: var(--text); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .history-item-meta {
    margin-top: 8px; font-size: 11px; color: var(--muted);
    display: flex; gap: 12px;
  }
  .history-item-actions {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .btn-small {
    font-size: 11px; font-weight: 500; padding: 6px 12px;
    border-radius: 100px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text2); cursor: pointer;
    transition: all 0.2s;
  }
  .btn-small.danger { color: var(--accent); border-color: rgba(200,65,42,0.2); }
  .btn-small:active { transform: scale(0.95); }
</style>
</head>
<body>

<div class="header">
  <span class="logo">trans<span>·</span>criptor</span>
  <div class="header-right">
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">listo</span>
    </div>
    <button class="btn-history" id="btnHistory">historial</button>
  </div>
</div>

<div class="waveform-container" id="waveform"></div>
<div class="proc-bar"><div class="proc-fill" id="procFill"></div></div>

<div class="transcript-wrapper">
  <div class="transcript-scroll" id="transcriptScroll">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎙️</div>
      <div class="empty-title">Listo para grabar</div>
      <div class="empty-sub">Presioná el botón rojo y empezá a hablar. La transcripción aparece en segundos.</div>
    </div>
  </div>
</div>

<div class="footer-info" id="footerInfo" style="display:none">
  <span class="info-chip" id="wordCountEl">0 palabras</span>
  <span class="info-chip" id="segCountEl">0 segmentos</span>
</div>

<div class="bottom-bar">
  <div class="btn-row">
    <button class="btn-side" id="btnClear">borrar</button>
    <button class="btn-side" id="btnCopy">copiar</button>
    <button class="btn-side" id="btnExport">exportar</button>
  </div>
  <button class="btn-record" id="btnRecord">
    <div class="btn-record-inner"></div>
  </button>
</div>

<!-- History panel -->
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <span class="history-title">Historial</span>
    <button class="btn-close" id="btnCloseHistory">Cerrar</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────
const WORKER_URL  = 'https://transcriptor-proxy.videotazmania1.workers.dev/';
const CHUNK_MS    = 6000;
const DB_NAME     = 'transcriptor-v1';
const DB_STORE    = 'sessions';

// ── State ─────────────────────────────────────────────────────────────
let mediaRecorder  = null;
let currentChunks  = [];
let isRecording    = false;
let blocks         = [];
let chunkInterval  = null;
let chunkQueue     = Promise.resolve();
let chunkCounter   = 0;
let analyser       = null;
let animFrame      = null;
let stream         = null;
let db             = null;
let sessionStart   = null;

// ── DOM ───────────────────────────────────────────────────────────────
const btnRecord   = document.getElementById('btnRecord');
const btnClear    = document.getElementById('btnClear');
const btnCopy     = document.getElementById('btnCopy');
const btnExport   = document.getElementById('btnExport');
const btnHistory  = document.getElementById('btnHistory');
const btnCloseH   = document.getElementById('btnCloseHistory');
const statusPill  = document.getElementById('statusPill');
const statusText  = document.getElementById('statusText');
const scroll      = document.getElementById('transcriptScroll');
const emptyState  = document.getElementById('emptyState');
const toast       = document.getElementById('toast');
const waveform    = document.getElementById('waveform');
const procFill    = document.getElementById('procFill');
const footerInfo  = document.getElementById('footerInfo');
const wordCountEl = document.getElementById('wordCountEl');
const segCountEl  = document.getElementById('segCountEl');
const histPanel   = document.getElementById('historyPanel');
const histList    = document.getElementById('historyList');

// ── Waveform ──────────────────────────────────────────────────────────
const BAR_COUNT = 50;
for (let i = 0; i < BAR_COUNT; i++) {
  const b = document.createElement('div');
  b.className = 'wave-bar';
  waveform.appendChild(b);
}
const bars = waveform.querySelectorAll('.wave-bar');

function animateWave(arr) {
  if (!analyser) return;
  animFrame = requestAnimationFrame(() => animateWave(arr));
  analyser.getByteFrequencyData(arr);
  const step = Math.floor(arr.length / BAR_COUNT);
  bars.forEach((b, i) => {
    b.style.height = Math.max(3, (arr[i * step] / 255) * 38) + 'px';
  });
}
function stopWaveAnim() {
  if (animFrame) cancelAnimationFrame(animFrame);
  bars.forEach(b => { b.style.height = '4px'; b.classList.remove('active'); });
}

// ── Helpers ───────────────────────────────────────────────────────────
function setStatus(txt, live = false) {
  statusText.textContent = txt;
  statusPill.className = 'status-pill' + (live ? ' live' : '');
}

let toastTimer;
function showToast(msg, isError = false) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.className = 'toast', 3200);
}

function nowTime() {
  return new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onloadend = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

function getSupportedMime() {
  for (const t of ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4','']) {
    if (!t || MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

function updateFooter() {
  if (!blocks.length) { footerInfo.style.display = 'none'; return; }
  footerInfo.style.display = 'flex';
  const words = blocks.reduce((n, b) => n + b.text.trim().split(/\s+/).filter(Boolean).length, 0);
  wordCountEl.textContent = `${words} palabra${words !== 1 ? 's' : ''}`;
  segCountEl.textContent  = `${blocks.length} segmento${blocks.length !== 1 ? 's' : ''}`;
}

// ── IndexedDB ─────────────────────────────────────────────────────────
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const store = e.target.result.createObjectStore(DB_STORE, { keyPath:'id', autoIncrement:true });
      store.createIndex('date', 'date');
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror   = () => rej(req.error);
  });
}

async function saveSession() {
  if (!db || !blocks.length) return;
  const session = {
    date:     new Date().toISOString(),
    blocks:   blocks,
    wordCount: blocks.reduce((n,b) => n + b.text.trim().split(/\s+/).filter(Boolean).length, 0),
  };
  return new Promise((res, rej) => {
    const tx  = db.transaction(DB_STORE, 'readwrite');
    const req = tx.objectStore(DB_STORE).add(session);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

async function loadSessions() {
  if (!db) return [];
  return new Promise((res, rej) => {
    const tx  = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).index('date').getAll();
    req.onsuccess = () => res((req.result || []).reverse());
    req.onerror   = () => rej(req.error);
  });
}

async function deleteSession(id) {
  if (!db) return;
  return new Promise((res, rej) => {
    const tx  = db.transaction(DB_STORE, 'readwrite');
    const req = tx.objectStore(DB_STORE).delete(id);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  });
}

// ── Render transcript ─────────────────────────────────────────────────
function renderAll() {
  scroll.querySelectorAll('.text-block, .interim-block, .empty-state').forEach(e => e.remove());
  if (!blocks.length && !isRecording) { scroll.appendChild(emptyState); updateFooter(); return; }
  blocks.forEach(b => scroll.appendChild(buildBlock(b)));
  if (isRecording) scroll.appendChild(buildInterimBlock(''));
  scroll.scrollTop = scroll.scrollHeight;
  updateFooter();
}

function buildBlock({ time, text, seg }) {
  const div = document.createElement('div');
  div.className = 'text-block';
  div.innerHTML = `
    <div class="block-meta">
      <span class="block-time">${time}</span>
      ${seg ? `<span class="block-seg">#${seg}</span>` : ''}
    </div>
    <div class="block-bubble">${text}</div>`;
  return div;
}

function buildInterimBlock(text) {
  const div = document.createElement('div');
  div.className = 'interim-block'; div.id = 'interimBlock';
  div.innerHTML = `<div class="interim-bubble">${text}<span class="cursor"></span></div>`;
  return div;
}

function appendBlock(block) {
  const interim = document.getElementById('interimBlock');
  const el = buildBlock(block);
  if (interim) scroll.insertBefore(el, interim);
  else scroll.appendChild(el);
  scroll.scrollTop = scroll.scrollHeight;
  updateFooter();
}

// ── Transcription via Groq Whisper ────────────────────────────────────
async function transcribeChunk(blob, segNum) {
  if (blob.size < 1000) return;
  procFill.classList.add('active');

  // Show interim placeholder
  const interim = document.getElementById('interimBlock');
  if (interim) interim.querySelector('.interim-bubble').innerHTML = `<em style="opacity:0.5;font-size:14px">transcribiendo segmento #${segNum}…</em><span class="cursor"></span>`;

  try {
    const b64  = await blobToBase64(blob);
    const data = b64.split(',')[1];
    const mime = blob.type || 'audio/webm';

    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        groq: true,
        audio: data,
        mimeType: mime,
        language: 'es',
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const json = await res.json();
    const text = json.text?.trim();

    if (!text || text === '...') return;

    const block = { time: nowTime(), text, seg: segNum };
    blocks.push(block);
    appendBlock(block);

    // Reset interim
    const interimEl = document.getElementById('interimBlock');
    if (interimEl) interimEl.querySelector('.interim-bubble').innerHTML = '<span class="cursor"></span>';

  } catch (err) {
    console.error('Transcription error:', err);
    showToast('Error: ' + (err.message || 'desconocido'), true);
  } finally {
    procFill.classList.remove('active');
  }
}

function enqueueChunk(blob) {
  chunkCounter++;
  const n = chunkCounter;
  chunkQueue = chunkQueue.then(() => transcribeChunk(blob, n));
}

// ── Recording ─────────────────────────────────────────────────────────
async function startRecording() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (err) {
    const msgs = {
      NotAllowedError: 'Permiso denegado — habilitá el micrófono',
      NotFoundError:   'No se encontró micrófono',
      NotReadableError:'Micrófono en uso por otra app',
    };
    showToast(msgs[err.name] || 'Error de micrófono: ' + err.name, true);
    return;
  }

  // Waveform
  const ctx = new AudioContext();
  const src = ctx.createMediaStreamSource(stream);
  analyser  = ctx.createAnalyser(); analyser.fftSize = 256;
  src.connect(analyser);
  const arr = new Uint8Array(analyser.frequencyBinCount);
  bars.forEach(b => b.classList.add('active'));
  animateWave(arr);

  const mime    = getSupportedMime();
  mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
  currentChunks = []; chunkCounter = 0;
  chunkQueue    = Promise.resolve();
  isRecording   = true; sessionStart = new Date();
  btnRecord.classList.add('recording');
  setStatus('grabando', true);
  renderAll();

  mediaRecorder.ondataavailable = e => {
    if (e.data?.size > 0) currentChunks.push(e.data);
  };

  chunkInterval = setInterval(() => {
    if (!currentChunks.length) return;
    const blob = new Blob(currentChunks, { type: mime || 'audio/webm' });
    currentChunks = [];
    enqueueChunk(blob);
  }, CHUNK_MS);

  mediaRecorder.start(1000);
}

async function stopRecording() {
  if (!mediaRecorder) return;
  clearInterval(chunkInterval); chunkInterval = null;
  isRecording = false;
  btnRecord.classList.remove('recording');
  setStatus('finalizando...', false);
  bars.forEach(b => b.classList.remove('active'));
  stopWaveAnim(); analyser = null;

  await new Promise(res => { mediaRecorder.onstop = res; mediaRecorder.stop(); });
  stream?.getTracks().forEach(t => t.stop());

  if (currentChunks.length) {
    const mime = getSupportedMime();
    enqueueChunk(new Blob(currentChunks, { type: mime || 'audio/webm' }));
    currentChunks = [];
  }

  await chunkQueue;

  document.getElementById('interimBlock')?.remove();
  if (!blocks.length) scroll.appendChild(emptyState);

  // Auto-save session
  if (blocks.length) {
    try { await saveSession(); } catch (e) { console.warn('Save failed:', e); }
  }

  setStatus('listo', false);
  updateFooter();
}

// ── History ───────────────────────────────────────────────────────────
async function openHistory() {
  histPanel.classList.add('open');
  histList.innerHTML = '';
  let sessions = [];
  try { sessions = await loadSessions(); } catch {}

  if (!sessions.length) {
    histList.innerHTML = '<div class="history-empty">📭<br>Todavía no hay sesiones guardadas</div>';
    return;
  }

  sessions.forEach(s => {
    const date = new Date(s.date);
    const dateStr = date.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' });
    const timeStr = date.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
    const preview = s.blocks?.[0]?.text || '(sin texto)';

    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <div class="history-item-date">${dateStr} · ${timeStr}</div>
      <div class="history-item-preview">${preview}</div>
      <div class="history-item-meta">
        <span>📝 ${s.wordCount || 0} palabras</span>
        <span>🎙 ${s.blocks?.length || 0} segmentos</span>
      </div>
      <div class="history-item-actions">
        <button class="btn-small" data-load="${s.id}">Cargar</button>
        <button class="btn-small" data-export="${s.id}">Exportar .txt</button>
        <button class="btn-small danger" data-delete="${s.id}">Eliminar</button>
      </div>`;
    histList.appendChild(div);

    div.querySelector('[data-load]').addEventListener('click', () => {
      blocks = s.blocks || [];
      renderAll();
      histPanel.classList.remove('open');
    });

    div.querySelector('[data-export]').addEventListener('click', () => {
      const txt = (s.blocks || []).map(b => `[${b.time}] ${b.text}`).join('\n\n');
      downloadTxt(txt, `transcripcion-${date.toISOString().slice(0,16).replace('T','-')}.txt`);
    });

    div.querySelector('[data-delete]').addEventListener('click', async () => {
      if (!confirm('¿Eliminar esta sesión?')) return;
      await deleteSession(s.id);
      div.remove();
      if (!histList.children.length)
        histList.innerHTML = '<div class="history-empty">📭<br>No hay sesiones guardadas</div>';
    });
  });
}

// ── Export ────────────────────────────────────────────────────────────
function downloadTxt(txt, name) {
  const blob = new Blob([txt], { type:'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

// ── Events ────────────────────────────────────────────────────────────
btnRecord.addEventListener('click', () => {
  if (isRecording) stopRecording(); else startRecording();
});

btnClear.addEventListener('click', () => {
  if (isRecording) return;
  blocks = []; renderAll();
});

btnCopy.addEventListener('click', () => {
  if (!blocks.length) { showToast('No hay texto para copiar'); return; }
  const txt = blocks.map(b => b.text).join('\n\n');
  navigator.clipboard.writeText(txt).then(() => {
    btnCopy.textContent = '✓ copiado';
    btnCopy.classList.add('success');
    setTimeout(() => { btnCopy.textContent = 'copiar'; btnCopy.classList.remove('success'); }, 2000);
  }).catch(() => showToast('No se pudo copiar', true));
});

btnExport.addEventListener('click', () => {
  if (!blocks.length) { showToast('No hay texto para exportar'); return; }
  const txt = blocks.map(b => `[${b.time}] ${b.text}`).join('\n\n');
  downloadTxt(txt, `transcripcion-${new Date().toISOString().slice(0,16).replace('T','-')}.txt`);
});

btnHistory.addEventListener('click', openHistory);
btnCloseH.addEventListener('click', () => histPanel.classList.remove('open'));

// ── Init ──────────────────────────────────────────────────────────────
openDB().then(d => { db = d; }).catch(e => console.warn('IndexedDB unavailable:', e));
renderAll();
</script>
